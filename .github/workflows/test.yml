name: 🧪 Test Automatizado - Login D1Shop

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-login:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3

      # 2. Instalar Node.js para poder usar npx serve
      - name: 🟢 Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Instalar dependencias de Node
      - name: 📦 Instalar dependencias Node
        run: npm install

      # 4. Levantar la app en localhost:3000 en segundo plano
      - name: 🚀 Levantar app en localhost:3000
        run: npm start &

      # 5. Esperar que el servidor esté listo
      - name: ⏳ Esperar que el servidor esté listo
        run: sleep 5

      # 6. Instalar Python
      - name: 🐍 Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 7. Instalar las dependencias de Python
      - name: 📦 Instalar dependencias Python
        run: pip install selenium webdriver-manager

      # 8. Instalar Google Chrome (requerido en ubuntu-latest)
      - name: 🌐 Instalar Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 9. Ejecutar el script de Selenium
      - name: 🤖 Ejecutar test de login con Selenium
        run: python main.py
