name: 🧪 Test Automatizado - Login D1Shop

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-login:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      # 2. Instalar Node.js
      - name: 🟢 Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Instalar dependencias de Node
      - name: 📦 Instalar dependencias Node
        run: npm install

      # 4. Levantar la app en localhost:3000 en segundo plano
      - name: 🚀 Levantar app en localhost:3000
        run: npm start &

      # 5. Esperar que el servidor esté REALMENTE listo
      - name: ⏳ Esperar que localhost:3000 responda
        run: |
          echo "Esperando que el servidor levante..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "✅ Servidor listo en intento $i"
              break
            fi
            echo "Intento $i: servidor no listo, esperando 2s..."
            sleep 2
          done

      # 6. Instalar Python
      - name: 🐍 Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 7. Instalar dependencias de Python
      - name: 📦 Instalar dependencias Python
        run: pip install selenium

      # 8. Instalar Chrome y ChromeDriver sincronizados
      - name: 🌐 Instalar Chrome y ChromeDriver sincronizados
        uses: browser-actions/setup-chrome@v1

      # 9. Ejecutar el test de login con Selenium
      - name: 🤖 Ejecutar test de login con Selenium
        run: python main.py
