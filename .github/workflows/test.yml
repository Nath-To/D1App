name: 🧪 Test Automatizado - Login D1Shop

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-login:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: d1shop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🟢 Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ✅ Eliminar node_modules de Windows y reinstalar en Linux
      - name: 📦 Reinstalar dependencias en Linux
        run: |
          rm -rf node_modules
          npm install

      - name: 🗄️ Crear tablas en PostgreSQL
        run: |
          psql postgresql://postgres:postgres@localhost:5432/d1shop << 'SQL'
          CREATE TABLE IF NOT EXISTS users (
            user_id SERIAL PRIMARY KEY,
            email VARCHAR(255) UNIQUE NOT NULL,
            password_hash VARCHAR(255) NOT NULL,
            full_name VARCHAR(255) NOT NULL,
            role VARCHAR(50) DEFAULT 'usuario',
            created_at TIMESTAMP DEFAULT NOW()
          );
          CREATE TABLE IF NOT EXISTS categories (
            category_id SERIAL PRIMARY KEY,
            name VARCHAR(255) NOT NULL,
            description TEXT,
            image_url TEXT,
            display_order INT DEFAULT 0,
            is_active BOOLEAN DEFAULT TRUE
          );
          CREATE TABLE IF NOT EXISTS products (
            product_id SERIAL PRIMARY KEY,
            name VARCHAR(255) NOT NULL,
            description TEXT,
            price NUMERIC(10,2) NOT NULL,
            offer_price NUMERIC(10,2),
            image_url TEXT,
            is_featured BOOLEAN DEFAULT FALSE,
            stock INT DEFAULT 0,
            category_id INT REFERENCES categories(category_id),
            is_active BOOLEAN DEFAULT TRUE
          );
          CREATE TABLE IF NOT EXISTS cart_items (
            cart_item_id SERIAL PRIMARY KEY,
            user_id INT REFERENCES users(user_id),
            product_id INT REFERENCES products(product_id),
            quantity INT DEFAULT 1,
            unit_price NUMERIC(10,2),
            added_at TIMESTAMP DEFAULT NOW(),
            UNIQUE(user_id, product_id)
          );
          CREATE TABLE IF NOT EXISTS payment_methods (
            payment_method_id SERIAL PRIMARY KEY,
            name VARCHAR(255),
            description TEXT,
            icon_url TEXT,
            is_active BOOLEAN DEFAULT TRUE
          );
          CREATE TABLE IF NOT EXISTS orders (
            order_id SERIAL PRIMARY KEY,
            user_id INT REFERENCES users(user_id),
            address_id INT,
            payment_method_id INT,
            status VARCHAR(50),
            subtotal NUMERIC(10,2),
            total_amount NUMERIC(10,2),
            created_at TIMESTAMP DEFAULT NOW()
          );
          CREATE TABLE IF NOT EXISTS order_items (
            order_item_id SERIAL PRIMARY KEY,
            order_id INT REFERENCES orders(order_id),
            product_id INT,
            product_name VARCHAR(255),
            quantity INT,
            unit_price NUMERIC(10,2),
            subtotal NUMERIC(10,2)
          );
          SQL

      # ✅ Ahora bcrypt funciona porque se compiló en Linux
      - name: 👤 Insertar usuario de prueba
        run: |
          node -e "
          const bcrypt = require('bcrypt');
          bcrypt.hash('elidreyes', 10).then(hash => {
            const { Pool } = require('pg');
            const pool = new Pool({ connectionString: 'postgresql://postgres:postgres@localhost:5432/d1shop' });
            pool.query(
              \`INSERT INTO users (email, password_hash, full_name, role)
               VALUES ('elidreyes@correo.com', '\${hash}', 'Elid Reyes', 'usuario')
               ON CONFLICT (email) DO NOTHING\`
            ).then(() => { console.log('✅ Usuario creado'); pool.end(); });
          });
          "

      - name: ⚙️ Crear archivo .env
        run: |
          echo "PORT=3000" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_NAME=d1shop" >> .env
          echo "DB_USER=postgres" >> .env
          echo "DB_PASSWORD=postgres" >> .env

      - name: 🚀 Levantar app en localhost:3000
        run: npm start &

      - name: ⏳ Esperar que localhost:3000 responda
        run: |
          echo "Esperando que el servidor levante..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "✅ Servidor listo en intento $i"
              break
            fi
            echo "Intento $i: servidor no listo, esperando 2s..."
            sleep 2
          done

      - name: 🐍 Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias Python
        run: pip install selenium

      - name: 🌐 Instalar Chrome y ChromeDriver sincronizados
        uses: browser-actions/setup-chrome@v1

      - name: 🤖 Ejecutar test de login con Selenium
        run: python main.py
